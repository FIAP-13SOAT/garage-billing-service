name: Deploy — garage-billing-service

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: garage-billing-service
  SERVICE: billing
  DEPLOYMENT: garage-billing-service

jobs:
  deploy:
    name: Build, push and deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          IMAGE_SHA="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.SERVICE }}-${{ github.sha }}"
          IMAGE_LATEST="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.SERVICE }}-latest"
          docker build -t "$IMAGE_SHA" -t "$IMAGE_LATEST" .
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name garage-cluster

      - name: Create / update K8s secrets
        run: |
          DB_HOST=$(aws ssm get-parameter \
            --name /garage/prod/${{ env.SERVICE }}/db/endpoint \
            --query Parameter.Value --output text)
          SECRET_ARN=$(aws ssm get-parameter \
            --name /garage/prod/${{ env.SERVICE }}/db/secret_arn \
            --query Parameter.Value --output text)
          DB_PASS=$(aws secretsmanager get-secret-value \
            --secret-id "$SECRET_ARN" \
            --query SecretString --output text | jq -r '.password | @uri')
          DATABASE_URL="postgresql://postgres:${DB_PASS}@${DB_HOST}/garage_${{ env.SERVICE }}?sslmode=require"

          API_GW_URL=$(aws ssm get-parameter \
            --name /garage/prod/api_gateway_url \
            --query Parameter.Value --output text)
          WEBHOOK_URL="${API_GW_URL}/webhook/mercadopago"

          kubectl create secret generic garage-billing-service-secrets \
            --from-literal=DATABASE_URL="$DATABASE_URL" \
            --from-literal=MERCADO_PAGO_ACCESS_TOKEN="${{ secrets.MERCADO_PAGO_ACCESS_TOKEN }}" \
            --from-literal=MERCADO_PAGO_WEBHOOK_URL="$WEBHOOK_URL" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic datadog-secrets \
            --from-literal=DD_API_KEY="${{ secrets.DD_API_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply database schema (prisma db push via K8s Job)
        run: |
          IMAGE_TAG="${{ github.sha }}"
          JOB_NAME="garage-billing-migrate-${IMAGE_TAG}"
          sed "s|__IMAGE_TAG__|${IMAGE_TAG}|g" k8s/migrate-job.yaml | kubectl apply -f -

          echo "::group::Waiting for job ${JOB_NAME}"
          DEADLINE=$(( $(date +%s) + 300 ))
          STATUS="pending"
          while [ $(date +%s) -lt $DEADLINE ]; do
            if kubectl get job "${JOB_NAME}" -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}' | grep -q True; then
              STATUS="complete"; break
            fi
            if kubectl get job "${JOB_NAME}" -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' | grep -q True; then
              STATUS="failed"; break
            fi
            sleep 5
          done
          echo "Final job status: ${STATUS}"
          echo "::endgroup::"

          echo "::group::Job describe"
          kubectl describe "job/${JOB_NAME}" || true
          echo "::endgroup::"

          echo "::group::Pod describe"
          kubectl describe pod -l job-name="${JOB_NAME}" || true
          echo "::endgroup::"

          echo "::group::Recent events"
          kubectl get events --sort-by=.lastTimestamp \
            --field-selector "involvedObject.kind=Pod" \
            -o jsonpath='{range .items[?(@.involvedObject.name)]}{.lastTimestamp}{"\t"}{.involvedObject.name}{"\t"}{.reason}{"\t"}{.message}{"\n"}{end}' \
            | grep "${JOB_NAME}" || kubectl get events --sort-by=.lastTimestamp | tail -30 || true
          echo "::endgroup::"

          echo "::group::Termination messages (apiserver, bypasses kubelet)"
          kubectl get pod -l job-name="${JOB_NAME}" \
            -o jsonpath='{range .items[*]}=== {.metadata.name} ==={"\n"}{.status.containerStatuses[*].state.terminated.message}{"\n\n"}{end}' \
            || true
          echo "::endgroup::"

          echo "::group::Pod logs (via kubelet, may fail with TLS error)"
          kubectl logs "job/${JOB_NAME}" --tail=500 --all-containers=true --insecure-skip-tls-verify-backend=true || true
          echo "::endgroup::"

          if [ "${STATUS}" = "complete" ]; then
            exit 0
          fi
          echo "Migration job did not complete (status=${STATUS})"
          exit 1

      - name: Apply K8s manifests
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/deployment.yaml

      - name: Update deployment image
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.SERVICE }}-${{ github.sha }}"
          kubectl set image deployment/${{ env.DEPLOYMENT }} \
            ${{ env.DEPLOYMENT }}="$IMAGE"
          kubectl rollout status deployment/${{ env.DEPLOYMENT }} --timeout=180s
