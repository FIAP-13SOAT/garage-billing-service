services:
  postgres:
    image: postgres:16-alpine
    container_name: garage_billing_db
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=garage_billing
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack:4
    container_name: garage_billing_localstack
    environment:
      - SERVICES=sqs
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
    ports:
      - "4566:4566"
    volumes:
      - ./localstack:/etc/localstack/init/ready.d
      - localstack_data:/var/lib/localstack

volumes:
  postgres_data:
  localstack_data:
