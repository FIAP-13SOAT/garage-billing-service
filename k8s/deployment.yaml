apiVersion: apps/v1
kind: Deployment
metadata:
  name: garage-billing-service
  namespace: default
  labels:
    app: garage-billing-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: garage-billing-service
  template:
    metadata:
      labels:
        app: garage-billing-service
      annotations:
        ad.datadoghq.com/garage-billing-service.logs: '[{"source":"nodejs","service":"garage-billing-service"}]'
    spec:
      containers:
        - name: garage-billing-service
          image: 500431122450.dkr.ecr.us-east-1.amazonaws.com/garage-app:billing-latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: garage-billing-service-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: garage-billing-service-secrets
                  key: DATABASE_URL
            - name: MERCADO_PAGO_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: garage-billing-service-secrets
                  key: MERCADO_PAGO_ACCESS_TOKEN
            - name: MERCADO_PAGO_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: garage-billing-service-secrets
                  key: MERCADO_PAGO_WEBHOOK_URL
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          resources:
            requests:
              memory: "256Mi"
              cpu: "125m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
