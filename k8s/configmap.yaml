apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-billing-service-config
  namespace: default
data:
  PORT: "8081"
  NODE_ENV: "production"
  MERCADO_PAGO_MOCK: "true"
  AWS_REGION: "us-east-1"
  SQS_BILLING_COMMANDS_URL: "https://sqs.us-east-1.amazonaws.com/500431122450/garage-billing-commands"
  SQS_BILLING_REPLIES_URL: "https://sqs.us-east-1.amazonaws.com/500431122450/garage-billing-replies"
  DD_SERVICE: "garage-billing-service"
  DD_ENV: "production"
  DD_VERSION: "1.0.0"
  DD_TRACE_ENABLED: "true"
  DD_SITE: "us5.datadoghq.com"
